services:
  db:
    image: postgres:16-alpine
    container_name: test_storage_db
    env_file: ../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: test_storage_app
    env_file: ../.env
    volumes:
      - artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: test_storage_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - artifacts:/var/www/artifacts:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "nginx"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  artifacts:
