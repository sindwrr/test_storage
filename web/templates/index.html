<!DOCTYPE html>
<html>
<head>
    <title>Test Storage</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <header class="top-header">
        <h2>Welcome, {{.Username}}!</h2>
        <form action="/logout" method="post" class="logout-form">
            <button type="submit">Logout</button>
        </form>
    </header>

    <div class="container">
        <table>
            <tr>
                <th>File name</th>
                <th>Size (bytes)</th>
                <th>Component</th>
                <th>Build</th>
                <th>Suite</th>
                <th>Upload time</th>
                <th>Download</th>
            </tr>
            {{range .Artifacts}}
            <tr>
                <td>{{.FileName}}</td>
                <td>{{.FileSize}}</td>
                <td>{{.Component}}</td>
                <td>{{.Build}}</td>
                <td>{{.Suite}}</td>
                <td>{{.UploadTime.Format "2006-01-02 15:04:05.000000"}}</td>
                <td><a href="{{.DownloadURL}}">Download</a></td>
            </tr>
            {{else}}
            <tr><td colspan="7">No artifacts found.</td></tr>
            {{end}}
        </table>
    </div>
</body>
</html>
