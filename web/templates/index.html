<!DOCTYPE html>
<html>
<head>
    <title>Test Storage</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <header class="top-header">
        <h2>Welcome, {{.Username}}!</h2>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <form action="/analytics" method="get" class="header-form">
                <button type="submit">Analytics</button>
            </form>
            <form action="/logout" method="post" class="header-form">
                <button type="submit">Logout</button>
            </form>
        </div>
    </header>

    <div class="container">
        <table>
            <tr>
                <th>ID</th>
                <th>File name</th>
                <th>Size (bytes)</th>
                <th>Component</th>
                <th>Build</th>
                <th>Suite</th>
                <th>Upload time</th>
                <th>Download</th>
            </tr>
            {{range .Artifacts}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.FileName}}</td>
                <td>{{.FileSize}}</td>
                <td>{{.Component}}</td>
                <td>{{.Build}}</td>
                <td>{{.Suite}}</td>
                <td>{{.UploadTime.Format "2006-01-02 15:04:05.000000"}}</td>
                <td><a href="{{.DownloadURL}}">Download</a></td>
            </tr>
            {{else}}
            <tr><td colspan="8">No artifacts found.</td></tr>
            {{end}}
        </table>
    </div>
</body>
</html>
